name: gds

on:
  push:
  workflow_dispatch:

jobs:
  gds:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build GDS
        uses: TinyTapeout/tt-gds-action@ttihp26a
        with:
          pdk: ihp-sg13g2
          librelane-version: 3.0.0.rc0
          tools-repo: urish/tt-support-tools
          tools-ref: ihp-8x4

  precheck:
    needs: gds
    runs-on: ubuntu-24.04
    steps:
      - name: Run Tiny Tapeout Precheck
        uses: TinyTapeout/tt-gds-action/precheck@ttihp26a

  gl_test:
    needs: gds
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            git \
            make \
            g++ \
            build-essential \
            autoconf \
            bison \
            flex \
            gperf \
            ca-certificates \
            python3 \
            python3-dev \
            python3-pip

      - name: Build and install Icarus Verilog 13
        shell: bash
        run: |
          set -euxo pipefail
          cd /tmp
          git clone https://github.com/steveicarus/iverilog.git
          cd iverilog

          if git rev-parse --verify v13_0 >/dev/null 2>&1; then
            git checkout v13_0
          else
            git checkout master
          fi

          sh autoconf.sh
          ./configure
          make -j"$(nproc)"
          sudo make install

          which iverilog
          iverilog -V
          which vvp
          vvp -V

      - name: Install Python packages
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m pip install -r test/requirements.txt
          python3 -m pip freeze | grep -E 'cocotb|cocotbext|pytest' || true

      - name: Run GL tests
        shell: bash
        run: |
          set -euxo pipefail
          cd test
          make clean
          make
          ! grep failure results.xml

      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gl-test-results
          path: |
            test/tb.fst
            test/results.xml
            test/output/*

  viewer:
    needs: gds
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: TinyTapeout/tt-gds-action/viewer@ttihp26a
